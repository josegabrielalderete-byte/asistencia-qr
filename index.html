<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AsistenciaQR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c26;
  --border:#2a2a38; --accent:#6ee7b7; --accent2:#818cf8;
  --danger:#f87171; --text:#e2e8f0; --muted:#64748b; --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
header h1{font-family:'DM Serif Display',serif;font-size:1.3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tab-bar{display:flex;gap:6px;flex-wrap:wrap}
.tab-btn{padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--accent);color:#0a0a0f;font-weight:600;border-color:var(--accent)}

/* VIEWS */
.view{display:none;padding:28px 20px;max-width:600px;margin:0 auto}
.view.active{display:block}
.section-title{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:6px}
.section-sub{color:var(--muted);font-size:.88rem;margin-bottom:24px}

/* CARDS & FORMS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
label{font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus{border-color:var(--accent)}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#0a0a0f}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-sm{padding:6px 14px;font-size:.8rem}

/* STUDENT GRID */
#student-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:20px}
.student-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;position:relative;transition:border-color .2s}
.student-card:hover{border-color:var(--accent2)}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.2rem;color:#0a0a0f;margin:0 auto 10px}
.s-name{font-weight:600;font-size:.88rem;margin-bottom:3px}
.s-id{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:12px}
.del-btn{position:absolute;top:8px;right:8px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;transition:color .2s}
.del-btn:hover{color:var(--danger)}

/* QR MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;text-align:center;max-width:340px;width:92%;position:relative;animation:pop .25s ease}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:4px}
.modal p{color:var(--muted);font-size:.82rem;margin-bottom:18px}
#qr-container canvas,#qr-container img{border-radius:8px;border:6px solid #fff;margin-bottom:16px}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer}

/* ── CONFIRM SCREEN (anti-fraud) ── */
.confirm-screen{
  display:none; position:fixed; inset:0;
  background:var(--bg); z-index:200;
  flex-direction:column; align-items:center; justify-content:center;
  padding:32px; text-align:center;
}
.confirm-screen.open{display:flex}
.confirm-avatar{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Serif Display',serif;font-size:2.5rem;color:#0a0a0f;
  margin-bottom:20px;
  animation:pop .3s ease;
}
.confirm-name{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:6px}
.confirm-dni{font-size:.88rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px}
.confirm-date{font-size:.82rem;color:var(--muted);margin-bottom:32px}
.btn-presente{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;font-weight:800;border:none;
  padding:20px 48px;border-radius:16px;
  font-family:'DM Sans',sans-serif;font-size:1.3rem;
  cursor:pointer;width:100%;max-width:320px;
  box-shadow:0 8px 32px rgba(34,197,94,.35);
  transition:transform .15s,opacity .2s;
  letter-spacing:.02em;
}
.btn-presente:hover{transform:scale(1.03);opacity:.92}
.btn-presente:active{transform:scale(.97)}
.btn-cancelar{
  background:transparent;color:var(--muted);border:none;
  font-family:'DM Sans',sans-serif;font-size:.88rem;
  cursor:pointer;margin-top:16px;text-decoration:underline;
}
.confirm-success{
  display:none;flex-direction:column;align-items:center;
}
.success-icon{font-size:5rem;margin-bottom:16px;animation:pop .4s ease}
.success-msg{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:8px;color:var(--accent)}
.success-sub{color:var(--muted);font-size:.9rem}

/* ATTENDANCE TABLE */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 22px;flex:1;min-width:120px}
.stat-box .s-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.stat-box .s-val{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-top:3px}
.stat-box.green .s-val{color:var(--accent)}
.stat-box.purple .s-val{color:var(--accent2)}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:2px solid
